<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snow Chart Animator</title>
  <style>
    :root {
      --ink: #152136;
      --muted: #64748b;
      --line: #d8e2f0;
      --card: #ffffff;
      --bg1: #eef5ff;
      --bg2: #eefaf7;
      --accent: #0e7891;
      --accent2: #2aa8be;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(70vw 60vh at 15% 5%, rgba(42,168,190,.18), transparent 60%),
        radial-gradient(65vw 60vh at 95% 95%, rgba(92,119,255,.14), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      padding: 18px;
    }
    .app { max-width: 1150px; margin: 0 auto; display: grid; gap: 14px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 10px 24px rgba(15, 23, 42, .08); padding: 14px; }
    h1 { margin: 0; font-size: clamp(1.3rem,2.5vw,2rem); }
    .sub { margin: 6px 0 0; color: var(--muted); }
    .toolbar { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    label { display: grid; gap: 5px; font-size: .84rem; color: var(--muted); }
    select, input[type=range] { font: inherit; border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; background: white; min-width: 140px; }
    .btn { border: 0; border-radius: 10px; padding: 9px 12px; font: inherit; color: #fff; background: linear-gradient(180deg, var(--accent2), var(--accent)); cursor: pointer; box-shadow: 0 8px 16px rgba(14,120,145,.24); }
    .btn.alt { color: var(--ink); background: #eef4ff; box-shadow: none; border: 1px solid var(--line); }
    .pill { margin-left: auto; color: var(--muted); font-size: .85rem; }
    .status { display: flex; gap: 14px; flex-wrap: wrap; font-size: .95rem; color: var(--muted); margin-top: 6px; }
    .big { color: var(--ink); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: .94rem; }
    th, td { padding: 8px 6px; border-bottom: 1px solid var(--line); text-align: left; }
    th { color: var(--muted); font-size: .82rem; }
    .chart { display: grid; grid-template-columns: repeat(auto-fit, minmax(64px, 1fr)); gap: 4px; align-items: end; min-height: 290px; }
    .chart-head { margin-bottom: 8px; text-align: center; }
    .chart-title {
      margin: 0;
      font-size: clamp(1.15rem, 2.2vw, 1.7rem);
      line-height: 1.2;
      letter-spacing: 0.01em;
    }
    .chart-date {
      margin-top: 4px;
      color: var(--muted);
      font-weight: 700;
      font-size: 1rem;
    }
    .col { display: grid; gap: 7px; justify-items: center; align-items: end; }
    .val { font-size: .85rem; font-weight: 700; }
    .barbox { width: min(84px, 100%); height: 220px; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; background: linear-gradient(180deg,#f8fbff,#fff); display:flex; align-items:end; }
    .bar { width: 100%; min-height: 0; background: linear-gradient(180deg,#70dcf0,#219fb7 65%,#0f758b); transition: height .16s linear; }
    .bar.missing { height: 100% !important; background: repeating-linear-gradient(45deg,#e5e7eb,#e5e7eb 10px,#ccd2da 10px,#ccd2da 20px); }
    .year { color: var(--muted); font-size: .85rem; text-align:center; }
    @media (max-width: 760px) {
      .pill { width: 100%; margin-left: 0; }
      .barbox { height: 170px; }
    }
  
    .site-nav {
      max-width: 1150px;
      margin: 0 auto 14px;
      padding: 10px 12px;
      border: 1px solid var(--line, #d8e2f0);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 22px rgba(15, 23, 42, .08);
      backdrop-filter: blur(6px);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    .site-nav a {
      text-decoration: none;
      color: var(--ink, #152136);
      font-size: .9rem;
      font-weight: 600;
      border: 1px solid var(--line, #d8e2f0);
      border-radius: 999px;
      padding: 6px 10px;
      background: #f8fbff;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    .site-nav a:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, .12);
      background: #eef7ff;
    }

  

    /* mobile-polish-2026 */
    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      main,
      .app,
      .wrap {
        width: 100% !important;
        max-width: 100% !important;
      }

      .site-nav {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding: 8px;
        gap: 6px;
      }

      .site-nav a {
        flex: 0 0 auto;
        white-space: nowrap;
        font-size: 0.84rem;
        padding: 8px 11px;
      }

      .hero,
      .card {
        border-radius: 14px;
      }

      .toolbar {
        gap: 8px;
      }

      select,
      button,
      input[type=range] {
        min-height: 42px;
      }

      .grid {
        grid-template-columns: 1fr !important;
      }

      .chart {
        grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
        gap: 6px;
      }

      .barbox {
        height: 160px;
      }

      table {
        font-size: 0.88rem;
      }

      th,
      td {
        padding: 7px 5px;
      }
    }

  </style>
</head>

  <main class="app">
    <section class="card">
      <h1>Snow Chart Animator</h1>
      <p class="sub">Auto-cycles through dates from Oct 1 to Apr 30 for fast visual comparison across years.</p>
      <div class="toolbar">
        <label>Location
          <select id="dataset">
            <option value="tahoe">Tahoe/Donner (CSSL)</option>
            <option value="msski">Mt. Shasta (MSSKI)</option>
          </select>
        </label>
        <label>Label Mode
          <select id="labelMode">
            <option value="calendar">Calendar Year</option>
            <option value="snow">Snow Year</option>
          </select>
        </label>
        <label>Year Set
          <select id="yearSet">
            <option value="from2122">Start at 2021-22</option>
            <option value="all">Include 2020-21</option>
          </select>
        </label>
        <label>Speed: <span id="speedText">10</span> days/sec
          <input id="speed" type="range" min="1" max="30" step="1" value="10" />
        </label>
        <button id="playPause" class="btn">Pause</button>
        <button id="reset" class="btn alt">Reset to Oct 1</button>
        <div class="pill" id="meta"></div>
      </div>
      <div class="status">
        <div>Current Date: <span id="dateLabel" class="big"></span></div>
        <div>Frame: <span id="frameLabel" class="big"></span></div>
      </div>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr><th id="periodHeader">Year</th><th>Snow Depth (in)</th><th>Status</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <section class="card">
      <div class="chart-head">
        <h2 id="chartTitle" class="chart-title"></h2>
        <div id="chartDateLive" class="chart-date"></div>
      </div>
      <div id="chart" class="chart"></div>
    </section>
  </main>

  <script>
    const els = {
      dataset: document.getElementById('dataset'),
      labelMode: document.getElementById('labelMode'),
      speed: document.getElementById('speed'),
      speedText: document.getElementById('speedText'),
      playPause: document.getElementById('playPause'),
      reset: document.getElementById('reset'),
      meta: document.getElementById('meta'),
      dateLabel: document.getElementById('dateLabel'),
      frameLabel: document.getElementById('frameLabel'),
      periodHeader: document.getElementById('periodHeader'),
      yearSet: document.getElementById('yearSet'),
      chartTitle: document.getElementById('chartTitle'),
      chartDateLive: document.getElementById('chartDateLive'),
      rows: document.getElementById('rows'),
      chart: document.getElementById('chart'),
    };

    const datasets = {
      tahoe: JSON.parse(document.getElementById('data-tahoe').textContent),
      msski: JSON.parse(document.getElementById('data-msski').textContent),
    };

    function seasonDays() {
      const out = [];
      const start = new Date(2023, 9, 1);   // Oct 1
      const end = new Date(2024, 3, 30);    // Apr 30
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        out.push({ month: d.getMonth() + 1, day: d.getDate(), label: `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` });
      }
      return out;
    }

    const season = seasonDays();
    const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    let idx = 0;
    let playing = true;
    let timer = null;

    function snowYearLabel(year, month) {
      const start = month >= 10 ? year : year - 1;
      const endShort = String((start + 1) % 100).padStart(2, '0');
      return `${start}-${endShort}`;
    }

    function maxAllowedSnowYearStart() {
      const now = new Date();
      return now.getMonth() >= 9 ? now.getFullYear() : now.getFullYear() - 1;
    }

    function availableSnowYearStarts(rows) {
      const starts = new Set();
      rows.forEach(r => {
        const y = Number(r.year);
        const m = Number(r.month);
        if (Number.isNaN(y) || Number.isNaN(m)) return;
        starts.add(m >= 10 ? y : y - 1);
      });
      const maxStart = maxAllowedSnowYearStart();
      return [...starts].filter(s => s <= maxStart).sort((a, b) => a - b);
    }

    function applyYearSetFilter(starts) {
      if (els.yearSet.value === 'from2122') {
        return starts.filter(s => s >= 2021);
      }
      return starts;
    }

    function recordFor(rows, year, month, day) {
      return rows.find(r => Number(r.year) === year && Number(r.month) === month && Number(r.day) === day) || null;
    }

    // Hidden absolute scale (inches) with headroom to avoid bars hitting full height at seasonal peaks.
    function absoluteScaleInches(rows) {
      const vals = rows
        .map(r => (r.max_snow_in === null ? null : Number(r.max_snow_in)))
        .filter(v => v !== null && !Number.isNaN(v));
      if (!vals.length) return 1;
      const peak = Math.max(...vals);
      return Math.max(1, Math.ceil((peak * 1.12) / 10) * 10);
    }

    function render() {
      const rows = datasets[els.dataset.value] || [];
      const years = [...new Set(rows.map(r => Number(r.year)))].sort((a,b)=>a-b);
      const cur = season[idx];
      const mode = els.labelMode.value;
      const locationTitle = els.dataset.value === 'msski'
        ? "Mount Shasta Mid-Mountain (7617') Snow Depth (in)"
        : "Tahoe/Donner Snow Depth (in) at 6890' elevation";
      els.chartTitle.textContent = locationTitle;
      els.chartDateLive.textContent = `${MONTHS[cur.month - 1]} ${String(cur.day).padStart(2, '0')}`;

      els.periodHeader.textContent = mode === 'snow' ? 'Snow Year' : 'Year';
      let points;
      if (mode === 'snow') {
        const snowStarts = applyYearSetFilter(availableSnowYearStarts(rows));
        points = snowStarts.map(start => {
          const year = cur.month >= 10 ? start : start + 1;
          const rec = recordFor(rows, year, cur.month, cur.day);
          return {
            year,
            label: snowYearLabel(year, cur.month),
            value: rec && rec.max_snow_in !== null ? Number(rec.max_snow_in) : null,
            status: rec ? rec.status : 'missing'
          };
        });
      } else {
        const filteredYears = els.yearSet.value === 'from2122' ? years.filter(y => y >= 2021) : years;
        points = filteredYears.map(year => {
          const rec = recordFor(rows, year, cur.month, cur.day);
          return {
            year,
            label: String(year),
            value: rec && rec.max_snow_in !== null ? Number(rec.max_snow_in) : null,
            status: rec ? rec.status : 'missing'
          };
        });
      }

      const scaleInches = absoluteScaleInches(rows);

      els.rows.innerHTML = '';
      els.chart.innerHTML = '';
      points.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${p.label}</td><td>${p.value === null ? 'N/A' : p.value.toFixed(2)}</td><td>${p.status}</td>`;
        els.rows.appendChild(tr);

        const pct = p.value === null ? 100 : Math.max(2, (p.value / scaleInches) * 100);
        const col = document.createElement('div');
        col.className = 'col';
        col.innerHTML = `
          <div class="val">${p.value === null ? 'N/A' : p.value.toFixed(2) + '"'}</div>
          <div class="barbox"><div class="bar ${p.value === null ? 'missing' : ''}" style="height:${pct}%"></div></div>
          <div class="year">${p.label}</div>
        `;
        els.chart.appendChild(col);
      });

      els.dateLabel.textContent = cur.label;
      els.frameLabel.textContent = `${idx + 1} / ${season.length}`;
      els.meta.textContent = `${rows.length} records loaded · ${years[0] || 'N/A'}-${years[years.length-1] || 'N/A'}`;
    }

    function tick() {
      idx = (idx + 1) % season.length;
      render();
    }

    function restartTimer() {
      if (timer) clearInterval(timer);
      if (!playing) return;
      const dps = Number(els.speed.value);
      const ms = Math.max(20, Math.round(1000 / dps));
      timer = setInterval(tick, ms);
    }

    els.speed.addEventListener('input', () => {
      els.speedText.textContent = els.speed.value;
      restartTimer();
    });
    els.dataset.addEventListener('change', () => { idx = 0; render(); });
    els.labelMode.addEventListener('change', render);
    els.yearSet.addEventListener('change', render);
    els.playPause.addEventListener('click', () => {
      playing = !playing;
      els.playPause.textContent = playing ? 'Pause' : 'Play';
      restartTimer();
    });
    els.reset.addEventListener('click', () => { idx = 0; render(); });

    els.speedText.textContent = els.speed.value;
    render();
    restartTimer();
  </script>
</body>
</html>

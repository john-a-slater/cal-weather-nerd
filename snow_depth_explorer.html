<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MSSKI Snow Depth Explorer</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #667085;
      --sky: #dce9ff;
      --ice: #f6fbff;
      --panel: #ffffff;
      --line: #d7dfef;
      --accent: #0c6e7f;
      --accent-2: #1e9db4;
      --alert: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(80vw 60vh at 15% 10%, rgba(30, 157, 180, 0.13), transparent 60%),
        radial-gradient(60vw 60vh at 90% 90%, rgba(82, 123, 255, 0.16), transparent 60%),
        linear-gradient(180deg, #eff5ff 0%, #f6f9ff 45%, #f8fbff 100%);
      min-height: 100vh;
      padding: 22px;
    }

    .app {
      max-width: 1050px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .hero, .card {
      background: color-mix(in srgb, var(--panel) 92%, #ffffff);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(11, 30, 68, 0.08);
    }

    .hero {
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(30, 157, 180, 0.45), rgba(30, 157, 180, 0.08));
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.45rem, 2.9vw, 2.3rem);
      letter-spacing: 0.01em;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      max-width: 70ch;
    }

    .toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
    }

    .toggle {
      display: flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .toggle button {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: #f3f7ff;
      color: #26435a;
      box-shadow: none;
    }

    .toggle button.active {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: #fff;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.84rem;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    select {
      font: inherit;
      min-width: 160px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 9px 12px;
    }

    button {
      font: inherit;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(12, 110, 127, 0.26);
    }

    .meta {
      margin-left: auto;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card { padding: 16px; }

    h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #11576b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
    }

    th { color: var(--muted); font-size: 0.82rem; }

    .chart {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 12px;
      align-items: end;
      min-height: 270px;
    }

    .col {
      display: grid;
      gap: 8px;
      justify-items: center;
      align-items: end;
    }

    .val { font-weight: 700; font-size: 0.9rem; }

    .barbox {
      width: min(84px, 100%);
      height: 210px;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(180deg, var(--ice), #ffffff);
      display: flex;
      align-items: end;
    }

    .bar {
      width: 100%;
      background: linear-gradient(180deg, #65d4ea, #1f96ad 62%, #136c80);
      min-height: 0;
      transition: height 450ms ease;
    }

    .bar.missing {
      background: repeating-linear-gradient(
        45deg,
        #e5e7eb,
        #e5e7eb 10px,
        #c8cdd6 10px,
        #c8cdd6 20px
      );
      height: 100% !important;
    }

    .year { color: var(--muted); }

    .delta {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--ink);
    }

    .warn {
      color: var(--alert);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    @media (max-width: 760px) {
      .meta { width: 100%; margin-left: 0; }
      .chart { gap: 8px; }
      .barbox { height: 180px; }
      .val { font-size: 0.82rem; }
      .year { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>MSSKI Snow Depth Explorer</h1>
      <p class="sub">Pick a month/day and compare max snow depth across all years in your local MSSKI dataset.</p>
      <div class="toolbar">
        <label>
          Month
          <select id="month"></select>
        </label>
        <label>
          Day
          <select id="day"></select>
        </label>
        <label>
          Display
          <div class="toggle">
            <button id="mode-calendar" type="button" class="active">Calendar Year</button>
            <button id="mode-snow" type="button">Snow Year</button>
          </div>
        </label>
        <button id="go">Compare Date</button>
        <div id="meta" class="meta"></div>
      </div>
    </section>

    <section class="card">
      <h2>Year Comparison</h2>
      <table>
        <thead>
          <tr>
            <th id="period-header">Year</th>
            <th>Max Snow (in)</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="delta" class="delta"></div>
      <div id="warn" class="warn"></div>
    </section>

    <section class="card">
      <h2>Visual Chart</h2>
      <div id="chart" class="chart"></div>
    </section>
  </main>

<script>
    const monthEl = document.getElementById('month');
    const dayEl = document.getElementById('day');
    const rowsEl = document.getElementById('rows');
    const chartEl = document.getElementById('chart');
    const deltaEl = document.getElementById('delta');
    const warnEl = document.getElementById('warn');
    const metaEl = document.getElementById('meta');
    const periodHeaderEl = document.getElementById('period-header');
    const modeCalendarBtn = document.getElementById('mode-calendar');
    const modeSnowBtn = document.getElementById('mode-snow');

    let allRows = [];
    let years = [];
    let displayMode = 'calendar';

    function pad2(n) { return String(n).padStart(2, '0'); }

    function rebuildDays() {
      const m = Number(monthEl.value);
      const maxDay = new Date(2024, m, 0).getDate();
      const prev = Number(dayEl.value) || 1;
      dayEl.innerHTML = '';
      for (let d = 1; d <= maxDay; d++) {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        dayEl.appendChild(opt);
      }
      dayEl.value = String(Math.min(prev, maxDay));
    }

    function recordFor(year, month, day) {
      return allRows.find(r => Number(r.year) === year && Number(r.month) === month && Number(r.day) === day) || null;
    }

    // Hidden absolute scale (inches) with headroom to avoid bars hitting full height at seasonal peaks.
    function absoluteScaleInches(rows) {
      const vals = rows
        .map(r => (r.max_snow_in === null ? null : Number(r.max_snow_in)))
        .filter(v => v !== null && !Number.isNaN(v));
      if (!vals.length) return 1;
      const peak = Math.max(...vals);
      return Math.max(1, Math.ceil((peak * 1.12) / 10) * 10);
    }

    function snowYearLabel(year, month) {
      const start = month >= 10 ? year : year - 1;
      const endShort = String((start + 1) % 100).padStart(2, '0');
      return `${start}-${endShort}`;
    }

    function maxAllowedSnowYearStart() {
      const now = new Date();
      return now.getMonth() >= 9 ? now.getFullYear() : now.getFullYear() - 1;
    }

    function availableSnowYearStarts(rows) {
      const starts = new Set();
      rows.forEach(r => {
        const y = Number(r.year);
        const m = Number(r.month);
        if (Number.isNaN(y) || Number.isNaN(m)) return;
        starts.add(m >= 10 ? y : y - 1);
      });
      const maxStart = maxAllowedSnowYearStart();
      return [...starts].filter(s => s <= maxStart).sort((a, b) => a - b);
    }

    function periodLabel(year) {
      return String(year);
    }

    function setDisplayMode(mode) {
      displayMode = mode;
      modeCalendarBtn.classList.toggle('active', mode === 'calendar');
      modeSnowBtn.classList.toggle('active', mode === 'snow');
      periodHeaderEl.textContent = mode === 'snow' ? 'Snow Year' : 'Year';
    }

    function render() {
      const m = Number(monthEl.value);
      const d = Number(dayEl.value);
      rowsEl.innerHTML = '';
      chartEl.innerHTML = '';
      deltaEl.textContent = '';
      warnEl.textContent = '';

      let points;
      if (displayMode === 'snow') {
        const snowStarts = availableSnowYearStarts(allRows);
        points = snowStarts.map(start => {
          const year = m >= 10 ? start : start + 1;
          const rec = recordFor(year, m, d);
          return {
            year,
            label: snowYearLabel(year, m),
            value: rec && rec.max_snow_in !== null ? Number(rec.max_snow_in) : null,
            status: rec ? rec.status : 'missing',
          };
        });
      } else {
        points = years.map(year => {
          const rec = recordFor(year, m, d);
          return {
            year,
            label: periodLabel(year),
            value: rec && rec.max_snow_in !== null ? Number(rec.max_snow_in) : null,
            status: rec ? rec.status : 'missing',
          };
        });
      }

      const scaleInches = absoluteScaleInches(allRows);

      points.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.label}</td>
          <td>${p.value === null ? 'N/A' : p.value.toFixed(2)}</td>
          <td>${p.status}</td>
        `;
        rowsEl.appendChild(tr);

        const pct = p.value === null ? 100 : Math.max(2, (p.value / scaleInches) * 100);
        const col = document.createElement('div');
        col.className = 'col';
        col.innerHTML = `
          <div class="val">${p.value === null ? 'N/A' : p.value.toFixed(2) + '"'}</div>
          <div class="barbox"><div class="bar ${p.value === null ? 'missing' : ''}" style="height:${pct}%"></div></div>
          <div class="year">${p.label}</div>
        `;
        chartEl.appendChild(col);
      });

      const values = points.filter(p => p.value !== null).map(p => p.value);

      if (values.length >= 2) {
        const avg = values.reduce((a, b) => a + b, 0) / values.length;
        const hi = Math.max(...values);
        const lo = Math.min(...values);
        deltaEl.textContent = `Avg across ${values.length} available year(s): ${avg.toFixed(2)} in (range ${lo.toFixed(2)} to ${hi.toFixed(2)}).`;
      } else {
        deltaEl.textContent = 'Not enough data points yet for a multi-year average on this date.';
      }

      const missingCount = points.filter(p => p.value === null).length;
      if (missingCount > 0) {
        warnEl.textContent = `${missingCount} year(s) missing data for ${pad2(m)}-${pad2(d)} in the current local dataset.`;
      }

      const minYear = years.length ? Math.min(...years) : 'N/A';
      const maxYear = years.length ? Math.max(...years) : 'N/A';
      const modeText = displayMode === 'snow' ? 'Snow Year view' : 'Calendar Year view';
      metaEl.textContent = `${allRows.length} date/year records loaded (${minYear}-${maxYear}) · ${modeText}`;
    }

    async function loadData() {
      const embedded = document.getElementById('embedded-data');
      if (embedded && embedded.textContent.trim()) {
        try {
          const rows = JSON.parse(embedded.textContent);
          const valid = rows.some(r => r.status === 'ok' && r.max_snow_in !== null);
          if (rows.length && valid) {
            allRows = rows;
            years = [...new Set(rows.map(r => Number(r.year)))].sort((a, b) => a - b);
            return;
          }
        } catch (err) {
          // Fall through to file-based loading.
        }
      }

      const candidates = [
        './data/msski_daily_max_snow_2020_to_current.json',
        './data/msski_daily_max_from_local_downloads.json',
        './data/msski_daily_max_snow_2022_2026.json'
      ];

      for (const path of candidates) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) continue;
          const rows = await res.json();
          const valid = rows.some(r => r.status === 'ok' && r.max_snow_in !== null);
          if (rows.length && valid) {
            allRows = rows;
            years = [...new Set(rows.map(r => Number(r.year)))].sort((a, b) => a - b);
            return;
          }
        } catch (err) {
          // Try next source.
        }
      }

      allRows = [];
      years = [];
    }

    function initControls() {
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = `${pad2(m)}`;
        monthEl.appendChild(opt);
      }
      monthEl.value = '4';
      rebuildDays();
      dayEl.value = '17';

      monthEl.addEventListener('change', () => {
        rebuildDays();
        render();
      });
      dayEl.addEventListener('change', render);
      modeCalendarBtn.addEventListener('click', () => {
        setDisplayMode('calendar');
        render();
      });
      modeSnowBtn.addEventListener('click', () => {
        setDisplayMode('snow');
        render();
      });
      document.getElementById('go').addEventListener('click', render);
    }

    (async function main() {
      setDisplayMode('calendar');
      initControls();
      await loadData();
      render();
    })();
  </script>
</body>
</html>
